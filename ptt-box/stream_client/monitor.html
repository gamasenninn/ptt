<!DOCTYPE html>
<html lang="ja">
<head>
    <script>document.documentElement.dataset.theme = localStorage.getItem('ptt-theme') || 'midnight';</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTTモニター</title>
    <link rel="stylesheet" href="themes.css">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: var(--bg-page);
            color: var(--text-primary);
        }
        .container {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--bg-section);
        }
        h1 {
            margin: 0;
            font-size: 1.5em;
            font-weight: 500;
        }
        .header-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .volume-control {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .volume-control input[type="range"] {
            width: 80px;
            cursor: pointer;
            accent-color: var(--accent);
        }
        #volumeValue {
            min-width: 40px;
            font-size: 12px;
        }
        .status-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
        .status-badge.connected {
            background: var(--status-success-bg);
            color: var(--status-success-soft);
        }
        .status-badge.disconnected {
            background: var(--status-error-bg);
            color: var(--status-error-text);
        }
        .status-badge.connecting {
            background: var(--btn-secondary);
            color: var(--status-neutral);
        }

        /* PTT Status Section */
        .ptt-section {
            background: var(--bg-section);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .ptt-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .ptt-state {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .ptt-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--text-muted);
        }
        .ptt-indicator.idle {
            background: var(--text-muted);
        }
        .ptt-indicator.transmitting {
            background: var(--status-error);
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .ptt-speaker {
            font-size: 1.1em;
            font-weight: 500;
        }
        .ptt-timer {
            font-size: 0.9em;
            color: var(--text-tertiary);
        }
        .ptt-progress {
            height: 6px;
            background: var(--bg-page);
            border-radius: 3px;
            overflow: hidden;
        }
        .ptt-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--gradient-progress-start), var(--gradient-progress-end));
            width: 0%;
            transition: width 0.5s;
        }

        /* Clients Section */
        .clients-section {
            margin-bottom: 20px;
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .section-title {
            font-size: 1em;
            font-weight: 500;
            color: var(--text-tertiary);
        }
        .client-count {
            font-size: 0.9em;
            color: var(--accent);
        }
        .client-list {
            background: var(--bg-section);
            border-radius: 8px;
            overflow: hidden;
        }
        .client-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            border-bottom: 1px solid var(--bg-page);
            gap: 12px;
        }
        .client-item:last-child {
            border-bottom: none;
        }
        .client-status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .client-status-dot.connected {
            background: var(--status-success-soft);
        }
        .client-status-dot.connecting {
            background: var(--status-neutral);
        }
        .client-status-dot.failed {
            background: var(--status-error);
        }
        .client-info {
            flex: 1;
        }
        .client-name {
            font-weight: 500;
        }
        .client-details {
            font-size: 0.8em;
            color: var(--text-secondary);
            margin-top: 2px;
        }
        .client-ice {
            font-size: 0.75em;
            padding: 2px 8px;
            border-radius: 4px;
            background: var(--bg-page);
        }
        .client-ice.connected {
            color: var(--status-success-soft);
        }
        .client-ice.checking {
            color: var(--status-neutral);
        }
        .client-ice.failed {
            color: var(--status-error);
        }
        .no-clients {
            padding: 30px;
            text-align: center;
            color: var(--text-muted);
        }

        /* Stats Section */
        .stats-section {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: var(--bg-section);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }
        .stat-value {
            font-size: 1.5em;
            font-weight: 600;
            color: var(--accent);
        }
        .stat-label {
            font-size: 0.75em;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* Debug Section */
        .debug-section {
            margin-top: 15px;
        }
        .debug-toggle {
            background: var(--border-main);
            border: none;
            color: var(--text-tertiary);
            padding: 8px 16px;
            font-size: 12px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
        }
        .debug-toggle:hover {
            background: var(--border-medium);
        }
        .debug-log {
            margin-top: 10px;
            font-size: 11px;
            color: var(--text-secondary);
            text-align: left;
            max-height: 200px;
            overflow-y: auto;
            background: var(--bg-input);
            padding: 12px;
            border-radius: 6px;
            font-family: monospace;
            display: none;
        }

        /* Audio element (hidden) */
        audio {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>PTTモニター</h1>
            <div class="header-controls">
                <div class="volume-control">
                    <span>🔈</span>
                    <input type="range" id="volumeSlider" min="0" max="100" value="100"
                           oninput="setVolume(this.value)">
                    <span id="volumeValue">100%</span>
                </div>
                <span id="connectionStatus" class="status-badge disconnected">未接続</span>
            </div>
        </div>

        <!-- PTT Status -->
        <div class="ptt-section">
            <div class="ptt-header">
                <div class="ptt-state">
                    <div id="pttIndicator" class="ptt-indicator idle"></div>
                    <span id="pttSpeaker" class="ptt-speaker">待機中</span>
                </div>
                <span id="pttTimer" class="ptt-timer"></span>
            </div>
            <div class="ptt-progress">
                <div id="pttProgressBar" class="ptt-progress-bar"></div>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-section">
            <div class="stat-card">
                <div id="statClients" class="stat-value">0</div>
                <div class="stat-label">クライアント</div>
            </div>
            <div class="stat-card">
                <div id="statMonitors" class="stat-value">0</div>
                <div class="stat-label">モニター</div>
            </div>
            <div class="stat-card">
                <div id="statUptime" class="stat-value">0:00</div>
                <div class="stat-label">稼働時間</div>
            </div>
        </div>

        <!-- Connected Clients -->
        <div class="clients-section">
            <div class="section-header">
                <span class="section-title">接続中クライアント</span>
                <span id="clientCount" class="client-count">0</span>
            </div>
            <div id="clientList" class="client-list">
                <div class="no-clients">接続中のクライアントはありません</div>
            </div>
        </div>

        <!-- Audio element for PC mic -->
        <audio id="audio" autoplay playsinline></audio>

        <!-- Debug -->
        <div class="debug-section">
            <button class="debug-toggle" onclick="toggleDebug()">デバッグログ</button>
            <div id="debug" class="debug-log"></div>
        </div>
    </div>

    <script src="js/monitor.js"></script>
</body>
</html>
