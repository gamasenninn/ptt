<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#16213e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <title>Webトランシーバー</title>
    <style>
        * {
            box-sizing: border-box;
        }
        html {
            overscroll-behavior: none;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            max-width: 600px;
            margin: 5px auto;
            padding: 5px;
            background: #1a1a2e;
            color: #eee;
            overscroll-behavior: none;  /* プルダウンリロード抑制 */
        }
        .container {
            background: #16213e;
            border-radius: 12px;
            padding: 10px 15px;
            text-align: center;
        }
        /* Connection Toggle Button */
        .connection-toggle {
            width: 100%;
            margin: 8px 0;
            padding: 12px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 16px;
            transition: all 0.2s;
        }
        .connection-toggle.disconnected {
            background: #641220 !important;
            color: #f8d7da;
        }
        .connection-toggle.connecting {
            background: #3d405b !important;
            color: #f4f1de;
        }
        .connection-toggle.connected {
            background: #1b4332 !important;
            color: #95d5b2;
        }
        .connection-toggle.preparing {
            background: #5c4d1a !important;
            color: #f4f1de;
        }
        .connection-toggle.blocked {
            background: #4a1942 !important;
            color: #e8b4d8;
        }
        .connection-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .disconnected .connection-indicator { background: #e94560; }
        .connecting .connection-indicator { background: #f4f1de; animation: pulse 1s infinite; }
        .connected .connection-indicator { background: #95d5b2; }
        .preparing .connection-indicator { background: #f4f1de; animation: pulse 1s infinite; }
        .blocked .connection-indicator { background: #e8b4d8; }
        button:not(.ptt-button):not(.clients-badge):not(.history-edit-btn):not(.connection-toggle):not(.tab-btn):not(.modal-close):not(.clients-popup-close):not([class^="ai-btn"]) {
            background: #e94560;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
            transition: background 0.2s;
        }
        button:not(.ptt-button):not(.clients-badge):not(.history-edit-btn):not(.connection-toggle):not(.tab-btn):not(.modal-close):not(.clients-popup-close):not([class^="ai-btn"]):hover:not(:disabled) {
            background: #ff6b6b;
        }
        button:not(.ptt-button):not(.clients-badge):not(.history-edit-btn):not(.connection-toggle):not(.tab-btn):not(.modal-close):not(.clients-popup-close):not([class^="ai-btn"]):disabled {
            background: #555;
            cursor: not-allowed;
        }
        button:not(.ptt-button).secondary {
            background: #3d405b;
        }
        button:not(.ptt-button).secondary:hover:not(:disabled) {
            background: #5c5f7e;
        }
        .volume-meter {
            height: 4px;
            background: #0a1628;
            border-radius: 2px;
            overflow: hidden;
        }
        .volume-bar {
            height: 100%;
            background: linear-gradient(90deg, #00ff87, #60efff);
            width: 0%;
            transition: width 0.05s;
            border-radius: 2px;
        }
        .info {
            margin-top: 20px;
            font-size: 12px;
            color: #888;
        }
        /* PTT Button */
        .ptt-container {
            margin: 10px 0;
        }
        .ptt-ring {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            border: 8px solid transparent;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .ptt-ring.active {
            border-color: #e94560;
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.5);
        }
        .ptt-ring.transmitting {
            border-color: #e94560;
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.5);
        }
        .ptt-ring.receiving {
            border-color: #95d5b2;
            box-shadow: 0 0 30px rgba(149, 213, 178, 0.5);
        }
        .ptt-button {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: #3d405b;
            border: 5px solid #555;
            color: #eee;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            transition: all 0.15s;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }
        .ptt-button:active,
        .ptt-button.pressing,
        .ptt-button.transmitting,
        .ptt-button.receiving {
            /* 内側ボタンは色を変えない（外側リングが変わる） */
            background: #3d405b !important;
            border-color: #555 !important;
            box-shadow: none !important;
        }
        .ptt-button.pressing,
        .ptt-button.transmitting {
            transform: scale(0.95);
        }
        .ptt-button:disabled {
            background: #333;
            border-color: #444;
            cursor: not-allowed;
            opacity: 0.5;
        }
        /* タッチデバイスでのsticky hover/focus問題対策 */
        .ptt-button:focus {
            outline: none;
        }
        @media (hover: none) {
            .ptt-button:hover,
            .ptt-button:focus {
                background: #3d405b;
                border-color: #555;
                transform: none;
                box-shadow: none;
            }
        }
        .ptt-icon {
            font-size: 36px;
            margin-bottom: 5px;
        }
        .ptt-label {
            font-size: 14px;
            font-weight: 500;
        }
        /* Speaker Status */
        .speaker-status {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            padding: 6px 15px;
            background: #0f3460;
            border-radius: 8px;
            margin: 0 0 8px 0;
            font-size: 13px;
        }
        .speaker-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #666;
        }
        .speaker-indicator.transmitting {
            background: #e94560;
            animation: pulse 1s infinite;
        }
        .speaker-indicator.receiving {
            background: #95d5b2;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Tab Navigation */
        .tab-nav {
            display: flex;
            margin-bottom: 8px;
        }
        .tab-btn {
            flex: 1;
            padding: 8px;
            background: transparent !important;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 14px;
            margin: 0;
            border-bottom: 2px solid #0f3460;
            transition: color 0.2s, border-color 0.2s;
        }
        .tab-btn:hover {
            color: #aaa;
        }
        .tab-btn.active {
            color: #60efff;
            border-bottom-color: #60efff;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }

        /* History List */
        .history-list-container {
            position: relative;
            max-height: calc(100vh - 150px);
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }
        .pull-indicator {
            display: none;
            justify-content: center;
            align-items: center;
            padding: 15px;
            color: #60efff;
            font-size: 14px;
        }
        .pull-indicator.visible {
            display: flex;
        }
        .pull-indicator.refreshing {
            display: flex;
        }
        .pull-indicator .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #60efff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .history-list {
            text-align: left;
        }
        .history-item {
            display: flex;
            flex-direction: column;
            padding: 12px;
            background: #0f3460;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: background 0.2s;
            gap: 6px;
        }
        .history-item:hover {
            background: #1a4a7a;
        }
        .history-item.playing {
            background: #1b4332;
        }
        .history-row1 {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .history-row2 {
            padding-left: 34px;
        }
        .history-play-icon {
            font-size: 16px;
            color: #888;
            flex-shrink: 0;
            width: 20px;
            text-align: center;
        }
        .history-item.playing .history-play-icon {
            color: #e94560;
        }
        .source-badge {
            font-size: 16px;
            flex-shrink: 0;
        }
        .client-id {
            font-size: 0.75em;
            color: #60efff;
            background: rgba(96, 239, 255, 0.1);
            padding: 2px 6px;
            border-radius: 3px;
            font-family: monospace;
            flex-shrink: 0;
        }
        .history-datetime {
            font-size: 12px;
            color: #60efff;
        }
        .history-preview {
            font-size: 13px;
            color: #aaa;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .history-edit-btn {
            padding: 6px 12px;
            background: #3d405b;
            border: none;
            color: #aaa;
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
            flex-shrink: 0;
            margin-left: auto;
        }
        .history-edit-btn:hover {
            background: #5c5f7e;
            color: #fff;
        }
        .history-empty {
            text-align: center;
            color: #666;
            padding: 40px 20px;
        }
        .history-loading {
            text-align: center;
            color: #888;
            padding: 40px 20px;
        }

        /* Edit Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-content {
            background: #16213e;
            border-radius: 12px;
            width: 100%;
            max-width: 600px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #0f3460;
        }
        .modal-title {
            font-size: 16px;
            font-weight: 500;
        }
        .modal-close {
            background: none;
            border: none;
            color: #888;
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            line-height: 1;
        }
        .modal-body {
            padding: 20px;
            flex: 1;
            overflow-y: auto;
        }
        .modal-textarea {
            width: 100%;
            height: 300px;
            background: #0a0a15;
            border: 1px solid #0f3460;
            border-radius: 6px;
            color: #eee;
            font-family: monospace;
            font-size: 13px;
            padding: 12px;
            resize: vertical;
        }
        .modal-footer {
            display: flex;
            gap: 10px;
            padding: 15px 20px;
            border-top: 1px solid #0f3460;
            justify-content: flex-end;
        }
        .modal-btn {
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }
        .modal-btn-primary {
            background: #60efff;
            color: #1a1a2e;
            border: none;
        }
        .modal-btn-secondary {
            background: #3d405b;
            color: #eee;
            border: none;
        }

        /* Clients Count */
        .clients-badge {
            background: none;
            border: none;
            color: #888;
            font-size: 12px;
            cursor: pointer;
            display: none;
            padding: 0;
            margin: 0;
        }
        .clients-badge:hover {
            color: #60efff;
        }
        .clients-badge.visible {
            display: inline;
        }

        /* Clients Popup */
        .clients-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #16213e;
            border-radius: 12px;
            min-width: 250px;
            max-width: 90%;
            max-height: 60vh;
            z-index: 1001;
            display: none;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }
        .clients-popup.active {
            display: block;
        }
        .clients-popup-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid #0f3460;
        }
        .clients-popup-title {
            font-size: 14px;
            font-weight: 500;
        }
        .clients-popup-close {
            background: none;
            border: none;
            color: #888;
            font-size: 20px;
            cursor: pointer;
            padding: 0;
            line-height: 1;
        }
        .clients-popup-body {
            padding: 8px 0;
            max-height: 300px;
            overflow-y: auto;
        }
        .client-item-popup {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
        }
        .client-item-popup:hover {
            background: #0f3460;
        }
        .client-icon {
            font-size: 16px;
        }
        .client-name-popup {
            font-size: 14px;
            color: #eee;
        }
        .no-clients-popup {
            padding: 20px;
            text-align: center;
            color: #888;
            font-size: 14px;
        }
        .clients-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            display: none;
        }
        .clients-overlay.active {
            display: block;
        }

        /* AI Tab Styles */
        .ai-input-container {
            position: relative;
            margin-bottom: 10px;
        }
        #aiQueryInput {
            width: 100%;
            padding: 12px;
            border: 1px solid #333;
            border-radius: 6px;
            background: #0a0a15;
            color: #fff;
            font-size: 16px;
            font-family: inherit;
            resize: none;
            min-height: 60px;
        }
        #aiQueryInput::placeholder {
            color: #666;
        }
        .ai-voice-preview {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(26, 58, 46, 0.97);
            border: 2px solid #2ed573;
            border-radius: 6px;
            padding: 12px;
            font-size: 16px;
            color: #fff;
            overflow-y: auto;
            z-index: 10;
        }
        .ai-voice-preview.active {
            display: block;
            animation: ai-pulse-border 1.5s infinite;
        }
        @keyframes ai-pulse-border {
            0%, 100% { border-color: #2ed573; }
            50% { border-color: #1a8a4e; }
        }
        .ai-voice-label {
            font-size: 12px;
            color: #2ed573;
            margin-bottom: 6px;
        }
        .ai-voice-content {
            color: #fff;
            min-height: 24px;
        }
        .ai-voice-content.interim {
            color: #aaa;
            font-style: italic;
        }
        .ai-button-row {
            display: flex;
            gap: 10px;
            margin-bottom: 8px;
        }
        .ai-btn-voice {
            flex: 1;
            padding: 12px 16px;
            background: #4a4a6a;
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
            touch-action: manipulation;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        .ai-btn-voice:hover:not(:disabled) {
            background: #5a5a7a;
        }
        .ai-btn-voice.listening {
            background: #2ed573;
            animation: pulse 1.5s infinite;
        }
        .ai-btn-send {
            flex: 1;
            padding: 12px 16px;
            background: #00d9ff;
            border: none;
            border-radius: 6px;
            color: #000;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .ai-btn-send:hover:not(:disabled) {
            background: #00b8d9;
        }
        .ai-btn-send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .ai-options-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .ai-mic-status {
            font-size: 12px;
            color: #888;
        }
        .ai-btn-stop {
            padding: 8px 16px;
            background: #ff6b6b;
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .ai-btn-stop:hover {
            background: #ee5a5a;
        }
        .ai-chat-container {
            background: #0f0f23;
            border-radius: 6px;
            min-height: 200px;
            max-height: calc(100vh - 380px);
            overflow-y: auto;
            margin-bottom: 10px;
        }
        .ai-chat-message {
            padding: 12px 16px;
            border-bottom: 1px solid #2a2a3a;
        }
        .ai-chat-message:last-child {
            border-bottom: none;
        }
        .ai-chat-message.user {
            background: #1e3a5f;
        }
        .ai-chat-message.ai {
            background: #16213e;
        }
        .ai-chat-message .role {
            font-size: 12px;
            font-weight: bold;
            color: #00d9ff;
            margin-bottom: 6px;
        }
        .ai-chat-message .content {
            color: #eee;
            line-height: 1.5;
            font-size: 14px;
        }
        .ai-chat-message .content code {
            background: #0f0f23;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.9em;
        }
        .ai-chat-message .content pre {
            background: #0f0f23;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
            margin: 8px 0;
        }
        .ai-chat-message .content pre code {
            background: transparent;
            padding: 0;
        }
        .ai-chat-message .content ul, .ai-chat-message .content ol {
            margin: 8px 0;
            padding-left: 20px;
        }
        .ai-chat-message .content p {
            margin: 0 0 8px 0;
        }
        .ai-chat-message .content p:last-child {
            margin-bottom: 0;
        }
        .ai-chat-message.loading .content {
            color: #888;
            font-style: italic;
        }
        .ai-chat-message.error .content {
            color: #ff6b6b;
        }
        .ai-chat-message.streaming .content {
            color: #ddd;
        }
        .ai-chat-message.streaming .ai-status {
            color: #888;
            font-style: italic;
        }
        .ai-chat-empty {
            color: #666;
            text-align: center;
            padding: 40px 20px;
            font-style: italic;
        }
        @keyframes ai-thinking {
            0%, 80%, 100% { opacity: 0.3; }
            40% { opacity: 1; }
        }
        .ai-thinking-dots span {
            animation: ai-thinking 1.4s infinite;
        }
        .ai-thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
        .ai-thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
        .ai-btn-clear {
            width: 100%;
            padding: 10px;
            background: #3d405b;
            border: none;
            border-radius: 6px;
            color: #aaa;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .ai-btn-clear:hover {
            background: #5c5f7e;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Tab Navigation -->
        <div class="tab-nav">
            <button class="tab-btn active" onclick="switchTab('transceiver')">トーク</button>
            <button class="tab-btn" onclick="switchTab('history')">履歴</button>
            <button class="tab-btn" onclick="switchTab('ai')">AI</button>
            <button class="tab-btn" onclick="switchTab('admin')">管理</button>
        </div>

        <!-- Transceiver Tab -->
        <div id="tab-transceiver" class="tab-content active">
            <!-- Connection Toggle -->
            <button id="connectionToggle" class="connection-toggle disconnected" onclick="toggleConnection()">
                <span class="connection-indicator"></span>
                <span class="connection-text">未接続 - タップで接続</span>
            </button>

            <!-- Speaker Status -->
            <div id="speakerStatus" class="speaker-status">
                <div style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 10px;">
                    <div id="speakerIndicator" class="speaker-indicator"></div>
                    <span id="speakerName">待機中</span>
                </div>
                <button id="clientsBadge" class="clients-badge" onclick="event.stopPropagation(); showClientsPopup()">0人</button>
            </div>

            <!-- Volume Meter -->
            <div class="volume-meter" style="margin-bottom: 15px;">
                <div id="p2pVolumeBar" class="volume-bar"></div>
            </div>

            <!-- PTT Button -->
            <div id="pttContainer" class="ptt-container">
                <div id="pttRing" class="ptt-ring">
                    <button id="pttBtn" class="ptt-button"
                            onpointerdown="pttStart(event)"
                            onpointerup="pttEnd(event)"
                            onpointercancel="pttEnd(event)"
                            onpointerleave="pttEnd(event)"
                            disabled>
                        <span class="ptt-icon">🎙️</span>
                        <span class="ptt-label">押して話す</span>
                    </button>
                </div>
            </div>

            <audio id="audio" autoplay playsinline></audio>

            <div style="margin-top: 12px; display: flex; align-items: center; gap: 10px;">
                <span style="font-size: 20px;" title="PCストリーム">🔈</span>
                <input type="range" id="volumeSlider" min="0" max="100" value="40"
                       style="flex: 1; height: 8px; cursor: pointer; accent-color: #60efff;"
                       oninput="setVolume(this.value)">
                <span id="volumeValue" style="min-width: 40px; text-align: right;">40%</span>
            </div>

            <div style="margin-top: 8px; display: flex; align-items: center; gap: 10px;">
                <span style="font-size: 20px;" title="P2P音声">👥</span>
                <input type="range" id="p2pVolumeSlider" min="0" max="100" value="40"
                       style="flex: 1; height: 8px; cursor: pointer; accent-color: #f39c12;"
                       oninput="setP2PVolume(this.value)">
                <span id="p2pVolumeValue" style="min-width: 40px; text-align: right;">40%</span>
            </div>

            <div style="margin-top: 10px;">
                <button onclick="openSettings()" style="background: #3d405b; padding: 8px 16px; font-size: 14px; width: 100%;">⚙️ 設定</button>
            </div>

            <div id="debugButtonContainer" style="margin-top: 10px; display: none;">
                <button onclick="toggleDebug()" style="background: #333; padding: 8px 16px; font-size: 14px; width: 100%;">デバッグ表示</button>
            </div>

            <div id="debug" style="margin-top: 10px; font-size: 12px; color: #aaa; text-align: left; max-height: 200px; overflow-y: auto; background: #0a0a15; padding: 12px; border-radius: 6px; word-break: break-all; display: none;">
            </div>
            <button id="sendLogsBtn" onclick="sendLogsToServer()" style="margin-top: 8px; background: #0f3460; padding: 8px 16px; font-size: 14px; width: 100%; display: none;">📤 ログをサーバーに送信</button>
        </div>

        <!-- AI Tab -->
        <div id="tab-ai" class="tab-content">
            <!-- AI Input -->
            <div class="ai-input-container">
                <textarea id="aiQueryInput" rows="2"
                          placeholder="AIに質問... (Ctrl+Enter で送信)"></textarea>
                <!-- Voice Preview (PTT中のみ表示、textareaに重ねて表示) -->
                <div id="aiVoicePreview" class="ai-voice-preview">
                    <div class="ai-voice-label">🎤 音声入力中</div>
                    <div id="aiVoicePreviewContent" class="ai-voice-content">聞き取り中...</div>
                </div>
            </div>
            <div class="ai-button-row">
                <button class="ai-btn-voice" id="aiVoiceInputBtn">
                    🎤 音声入力
                </button>
                <button class="ai-btn-send" id="aiSendBtn" onclick="sendAIQuery()">
                    送信
                </button>
            </div>
            <div class="ai-options-row">
                <span id="aiMicStatus" class="ai-mic-status"></span>
                <button class="ai-btn-stop" id="aiStopTtsBtn" onclick="stopAITTS()">音声停止</button>
            </div>
            <!-- Chat container -->
            <div id="aiChatContainer" class="ai-chat-container">
                <div class="ai-chat-empty">AIに質問してみましょう...</div>
            </div>
            <button class="ai-btn-clear" onclick="clearAIChat()">履歴クリア</button>
        </div>

        <!-- History Tab -->
        <div id="tab-history" class="tab-content">
            <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 10px;">
                <button onclick="loadHistory()" style="background: #3d405b; padding: 10px 20px; font-size: 14px;">更新</button>
                <div style="flex: 1; display: flex; align-items: center; gap: 8px;">
                    <span style="font-size: 16px;">🔊</span>
                    <input type="range" id="historyVolumeSlider" min="0" max="100" value="40"
                           style="flex: 1; height: 6px; cursor: pointer; accent-color: #60efff;"
                           oninput="setHistoryVolume(this.value)">
                    <span id="historyVolumeValue" style="min-width: 35px; font-size: 12px; text-align: right;">40%</span>
                </div>
            </div>
            <div id="historyListContainer" class="history-list-container">
                <div id="pullIndicator" class="pull-indicator">
                    <span class="spinner"></span>
                    <span class="pull-text">更新中...</span>
                </div>
                <div id="historyList" class="history-list">
                    <div class="history-loading">読み込み中...</div>
                </div>
            </div>
            <audio id="historyAudio" style="display: none;" preload="none"></audio>
        </div>

        <!-- Admin Tab -->
        <div id="tab-admin" class="tab-content">
            <iframe id="admin-iframe" src="" style="width: 100%; height: calc(100vh - 100px); border: none; background: #0a0a15;"></iframe>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title">SRT編集</span>
                <button class="modal-close" onclick="closeEditor()">&times;</button>
            </div>
            <div class="modal-body">
                <audio id="editAudioPlayer" controls preload="none" style="width: 100%; margin-bottom: 15px;"></audio>
                <textarea id="editTextarea" class="modal-textarea"></textarea>
            </div>
            <div class="modal-footer">
                <button class="modal-btn modal-btn-secondary" onclick="closeEditor()">キャンセル</button>
                <button class="modal-btn modal-btn-primary" onclick="saveSrt()">保存</button>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal-overlay">
        <div class="modal-content" style="max-width: 400px;">
            <div class="modal-header">
                <span class="modal-title">設定</span>
                <button class="modal-close" onclick="closeSettings()">&times;</button>
            </div>
            <div class="modal-body">
                <div style="margin-bottom: 20px;">
                    <div style="margin-bottom: 10px; font-weight: 500;">表示名</div>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <input type="text" id="displayNameInput" placeholder="名前を入力" maxlength="20" style="flex: 1; padding: 12px; background: #0a0a15; border: 1px solid #333; border-radius: 6px; color: #eee; font-size: 14px;">
                        <button onclick="saveDisplayName()" style="padding: 12px 20px; background: #3d405b; border: none; color: #eee; border-radius: 6px; cursor: pointer;">保存</button>
                    </div>
                    <div id="displayNameHint" style="margin-top: 10px; font-size: 12px; color: #888;">他のユーザーに表示される名前です</div>
                </div>
                <div style="margin-bottom: 20px;">
                    <div style="margin-bottom: 10px; font-weight: 500;">PTTショートカットキー</div>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <div id="pttKeyDisplay" style="flex: 1; padding: 12px; background: #0a0a15; border-radius: 6px; text-align: center; font-family: monospace;">Ctrl+Space</div>
                        <button onclick="startKeyRegistration()" id="registerKeyBtn" style="padding: 12px 20px; background: #3d405b; border: none; color: #eee; border-radius: 6px; cursor: pointer;">登録</button>
                    </div>
                    <div id="keyRegistrationHint" style="margin-top: 10px; font-size: 12px; color: #888; display: none;">キーを押してください...</div>
                </div>
                <div style="margin-bottom: 20px;">
                    <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                        <input type="checkbox" id="pttButtonToggle" checked onchange="togglePttButtonVisibility(this.checked)" style="width: 18px; height: 18px; cursor: pointer;">
                        <span>話すボタンを表示</span>
                    </label>
                </div>
                <div style="margin-bottom: 20px;">
                    <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                        <input type="checkbox" id="debugButtonToggle" onchange="toggleDebugButtonVisibility(this.checked)" style="width: 18px; height: 18px; cursor: pointer;">
                        <span>デバッグボタンを表示</span>
                    </label>
                </div>
                <div style="margin-bottom: 20px;">
                    <div style="margin-bottom: 10px; font-weight: 500;">マイクゲイン</div>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <span style="font-size: 20px;">🎤</span>
                        <input type="range" id="micGainSlider" min="50" max="300" value="100"
                               style="flex: 1; height: 8px; cursor: pointer; accent-color: #27ae60;"
                               oninput="setMicGain(this.value)">
                        <span id="micGainValue" style="min-width: 50px; text-align: right;">1.0x</span>
                    </div>
                    <div style="margin-top: 8px; font-size: 12px; color: #888;">送信音量を調整（0.5x〜3.0x）</div>
                </div>
                <div style="margin-bottom: 20px;">
                    <div style="margin-bottom: 10px; font-weight: 500;">AI音声</div>
                    <select id="ttsModeSelect" onchange="saveTtsMode(this.value)" style="width: 100%; padding: 12px; background: #0a0a15; border: 1px solid #333; border-radius: 6px; color: #eee; font-size: 14px; cursor: pointer;">
                        <option value="server">サーバーTTS（高品質）</option>
                        <option value="server_stream">サーバーTTS（ストリーミング）</option>
                        <option value="client">端末TTS（軽量）</option>
                        <option value="none">音声なし</option>
                    </select>
                    <div style="margin-top: 8px; font-size: 12px; color: #888;">
                        ストリーミング: 文ごとに読み上げ開始（高速）<br>
                        高品質: 全文完成後に読み上げ（安定）
                    </div>
                </div>
                <div style="margin-bottom: 10px;">
                    <button onclick="location.reload()" style="width: 100%; padding: 12px; background: #641220; border: none; color: #f8d7da; border-radius: 6px; cursor: pointer;">ページを再読み込み</button>
                </div>
            </div>
            <div class="modal-footer">
                <button class="modal-btn modal-btn-secondary" onclick="closeSettings()">閉じる</button>
            </div>
        </div>
    </div>

    <!-- Clients Popup -->
    <div id="clientsOverlay" class="clients-overlay" onclick="hideClientsPopup()"></div>
    <div id="clientsPopup" class="clients-popup">
        <div class="clients-popup-header">
            <span class="clients-popup-title">接続中 (<span id="clientsPopupCount">0</span>)</span>
            <button class="clients-popup-close" onclick="hideClientsPopup()">&times;</button>
        </div>
        <div id="clientsPopupBody" class="clients-popup-body">
            <div class="no-clients-popup">接続中のクライアントはいません</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="js/stream.js"></script>
    <script src="js/history.js"></script>
    <script src="js/assistant.js"></script>
    <script>
        // Service Worker登録
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then((registration) => {
                        console.log('SW registered:', registration.scope);
                    })
                    .catch((error) => {
                        console.log('SW registration failed:', error);
                    });
            });
        }
    </script>
</body>
</html>
