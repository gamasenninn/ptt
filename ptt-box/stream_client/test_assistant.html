<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI アシスタント</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: #1a1a2e;
            color: #eee;
        }
        h1 {
            text-align: center;
            color: #00d9ff;
        }
        .panel {
            background: #16213e;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .panel h2 {
            margin-top: 0;
            color: #00d9ff;
            font-size: 1.1em;
        }
        .connection-status {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff4757;
        }
        .status-dot.connected {
            background: #2ed573;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #333;
            border-radius: 4px;
            background: #0f0f23;
            color: #fff;
            font-size: 16px;
            margin-bottom: 10px;
        }
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-primary {
            background: #00d9ff;
            color: #000;
        }
        .btn-primary:hover:not(:disabled) {
            background: #00b8d9;
        }
        .btn-secondary {
            background: #333;
            color: #fff;
        }
        .btn-secondary:hover:not(:disabled) {
            background: #444;
        }
        .btn-voice {
            background: #4a4a6a;
            color: #fff;
            flex: 1;
            padding: 12px 16px;
            font-size: 14px;
        }
        .btn-voice:hover:not(:disabled) {
            background: #5a5a7a;
        }
        .btn-voice.listening {
            background: #2ed573;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        .button-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .panel-header h2 {
            color: #00d9ff;
            font-size: 1.1em;
        }
        .log-container {
            background: #0f0f23;
            border-radius: 4px;
            padding: 15px;
            height: 200px;
            overflow-y: auto;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 13px;
            transition: height 0.3s ease, padding 0.3s ease, opacity 0.3s ease;
        }
        .log-container.collapsed {
            height: 0;
            padding: 0 15px;
            opacity: 0;
            overflow: hidden;
        }
        .log-entry {
            margin-bottom: 8px;
            padding: 8px;
            border-radius: 4px;
        }
        .log-entry.sent {
            background: #1e3a5f;
            border-left: 3px solid #00d9ff;
        }
        .log-entry.received {
            background: #1e4035;
            border-left: 3px solid #2ed573;
        }
        .log-entry.error {
            background: #4a1e1e;
            border-left: 3px solid #ff4757;
        }
        .log-entry.info {
            background: #3d3d1e;
            border-left: 3px solid #ffa502;
        }
        .log-time {
            color: #888;
            font-size: 11px;
        }
        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
        }
        .checkbox-row input {
            width: 18px;
            height: 18px;
        }
        .textarea-container {
            position: relative;
            margin-bottom: 10px;
        }
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #333;
            border-radius: 4px;
            background: #0f0f23;
            color: #fff;
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
            min-height: 80px;
        }
        textarea::placeholder {
            color: #666;
        }
        .voice-preview {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(26, 58, 46, 0.97);
            border: 2px solid #2ed573;
            border-radius: 4px;
            padding: 12px;
            font-size: 16px;
            color: #fff;
            overflow-y: auto;
            z-index: 10;
        }
        .voice-preview.active {
            display: block;
            animation: pulse-border 1.5s infinite;
        }
        .voice-preview .label {
            font-size: 12px;
            color: #2ed573;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .voice-preview .content {
            color: #fff;
            min-height: 24px;
        }
        .voice-preview .content.interim {
            color: #aaa;
            font-style: italic;
        }
        @keyframes pulse-border {
            0%, 100% { border-color: #2ed573; }
            50% { border-color: #1a8a4e; }
        }
        .info-text {
            font-size: 12px;
            color: #888;
            margin-top: 10px;
        }
        /* Chat UI styles */
        .chat-container {
            background: #0f0f23;
            border-radius: 4px;
            min-height: 200px;
            max-height: 400px;
            overflow-y: auto;
        }

        .chat-message {
            padding: 16px 20px;
            border-bottom: 1px solid #2a2a3a;
        }

        .chat-message:last-child {
            border-bottom: none;
        }

        .chat-message.user {
            background: #1e3a5f;
        }

        .chat-message.ai {
            background: #16213e;
        }

        .chat-message .role {
            font-size: 13px;
            font-weight: bold;
            color: #00d9ff;
            margin-bottom: 8px;
        }

        .chat-message .content {
            color: #eee;
            line-height: 1.6;
        }

        /* Markdown styles */
        .chat-message .content code {
            background: #0f0f23;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.9em;
        }

        .chat-message .content pre {
            background: #0f0f23;
            padding: 12px;
            border-radius: 4px;
            overflow-x: auto;
            margin: 10px 0;
        }

        .chat-message .content pre code {
            background: transparent;
            padding: 0;
        }

        .chat-message .content ul, .chat-message .content ol {
            margin: 10px 0;
            padding-left: 24px;
        }

        .chat-message .content p {
            margin: 0 0 10px 0;
        }

        .chat-message .content p:last-child {
            margin-bottom: 0;
        }

        .chat-message .content a {
            color: #00d9ff;
        }

        .chat-message.loading .content {
            color: #888;
            font-style: italic;
        }

        .chat-message.error .content {
            color: #ff6b6b;
        }

        .chat-message.skipped .content {
            color: #888;
        }

        .chat-empty {
            color: #666;
            text-align: center;
            padding: 40px 20px;
            font-style: italic;
        }

        /* Thinking animation */
        @keyframes thinking {
            0%, 80%, 100% { opacity: 0.3; }
            40% { opacity: 1; }
        }

        .thinking-dots span {
            animation: thinking 1.4s infinite;
        }
        .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
        .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
        .btn-stop {
            background: #ff6b6b;
            color: #fff;
            margin-top: 10px;
            width: 100%;
        }
        .btn-stop:hover:not(:disabled) {
            background: #ee5a5a;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .header h1 {
            margin: 0;
            color: #00d9ff;
        }
        .header .connection-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 4px;
            background: #16213e;
            transition: background 0.2s;
        }
        .header .connection-toggle:hover {
            background: #1a2a4e;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>AI アシスタント</h1>
        <div class="connection-toggle" onclick="toggleConnection()">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">未接続</span>
        </div>
    </div>

    <!-- 入力パネル -->
    <div class="panel">
        <div class="textarea-container">
            <textarea id="queryInput" rows="3"
                      placeholder="ここに入力、または音声入力... (Ctrl+Enter で送信)"></textarea>
            <!-- Voice Preview (PTT中のみ表示、textareaに重ねて表示) -->
            <div id="voicePreview" class="voice-preview">
                <div class="label">🎤 音声入力中</div>
                <div id="voicePreviewContent" class="content">聞き取り中...</div>
            </div>
        </div>

        <!-- Button row: Voice Input + Send Query -->
        <div class="button-row" style="gap: 10px;">
            <button class="btn-voice" id="voiceInputBtn" style="flex: 1;">
                🎤 音声入力
            </button>
            <button class="btn-primary" id="sendBtn" onclick="sendQuery()" style="flex: 1;" disabled>
                送信
            </button>
        </div>

        <!-- Options row -->
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 5px;">
            <span id="micStatus" style="color: #888; font-size: 12px;"></span>
            <label style="font-size: 12px; color: #888;">
                <input type="checkbox" id="checkWakeWord" style="width: 14px; height: 14px; margin-right: 4px;">
                ウェイクワード
            </label>
        </div>
    </div>

    <!-- 会話パネル -->
    <div class="panel">
        <div id="chatContainer" class="chat-container">
            <div class="chat-empty">会話を始めましょう...</div>
        </div>
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button class="btn-secondary" onclick="clearChat()">履歴クリア</button>
            <button class="btn-stop" id="stopTtsBtn" onclick="stopTTS()" style="flex: 1; margin-top: 0;">音声停止</button>
        </div>
    </div>

    <!-- ログパネル (折りたたみ、デフォルト非表示) -->
    <div class="panel" id="logPanel">
        <div class="panel-header" onclick="toggleLogPanel()">
            <h2 style="margin: 0; cursor: pointer;">
                <span id="logToggleIcon">▶</span> 通信ログ
            </h2>
            <button class="btn-secondary" onclick="event.stopPropagation(); clearLog();" style="padding: 6px 12px; font-size: 12px;">クリア</button>
        </div>
        <div class="log-container collapsed" id="logContainer"></div>
    </div>

    <script>
        let ws = null;
        let recognition = null;
        let isListening = false;
        let micStream = null;
        let micEnabled = false;
        // 音声認識の状態（シンプル化）
        let voiceFinalText = '';     // 確定テキスト（セッション全体で蓄積）
        let voiceInterimText = '';   // 中間結果（未確定）
        let savedCursorPos = 0;      // PTT開始時のカーソル位置

        // marked.js初期化
        marked.setOptions({
            breaks: true,  // 改行をbrに変換
            gfm: true      // GitHub Flavored Markdown
        });

        // チャットメッセージ追加
        function addChatMessage(type, content, isMarkdown = false) {
            const container = document.getElementById('chatContainer');

            // 空の状態を削除
            const empty = container.querySelector('.chat-empty');
            if (empty) empty.remove();

            const message = document.createElement('div');
            message.className = `chat-message ${type}`;

            const roleText = type === 'user' ? '👤 あなた' : '🤖 アシスタント';
            const contentHtml = isMarkdown ? marked.parse(content) : escapeHtml(content);

            message.innerHTML = `
                <div class="role">${roleText}</div>
                <div class="content">${contentHtml}</div>
            `;

            container.appendChild(message);
            container.scrollTop = container.scrollHeight;
            return message;
        }

        // 履歴クリア
        function clearChat() {
            const container = document.getElementById('chatContainer');
            container.innerHTML = '<div class="chat-empty">会話を始めましょう...</div>';
        }

        // Get WebSocket URL (same origin as page)
        function getWsUrl() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const host = window.location.hostname || 'localhost';
            const port = window.location.port;
            // ポートが指定されている場合のみ追加（リバースプロキシ経由の場合は不要）
            const portPart = port ? `:${port}` : '';
            return `${protocol}//${host}${portPart}/ws`;
        }

        // Request microphone permission once
        async function enableMicrophone() {
            const statusEl = document.getElementById('micStatus');

            try {
                micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                micEnabled = true;

                statusEl.textContent = '長押しで音声入力';
                statusEl.style.color = '#2ed573';

                initSpeechRecognition();
                addLog('info', 'マイク有効化');

            } catch (err) {
                statusEl.textContent = 'マイク許可なし';
                statusEl.style.color = '#ff4757';
                addLog('error', `マイク許可エラー: ${err.message}`);
            }
        }

        // Initialize Speech Recognition
        function initSpeechRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                addLog('info', 'このブラウザは音声認識に対応していません');
                document.getElementById('voiceInputBtn').disabled = true;
                return;
            }

            recognition = new SpeechRecognition();
            recognition.lang = 'ja-JP';
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onresult = (event) => {
                // 現在のセッションの結果を取得
                let sessionFinal = '';
                let sessionInterim = '';

                for (let i = 0; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        sessionFinal += transcript;
                    } else {
                        sessionInterim += transcript;
                    }
                }

                // プレビューを更新（メインtextareaは触らない）
                const previewContent = document.getElementById('voicePreviewContent');
                const displayText = voiceFinalText + sessionFinal + sessionInterim;

                if (displayText) {
                    previewContent.textContent = displayText;
                    previewContent.classList.toggle('interim', sessionInterim.length > 0);
                } else {
                    previewContent.textContent = '聞き取り中...';
                    previewContent.classList.add('interim');
                }

                // 最終結果用に保存
                voiceInterimText = sessionInterim;
                // sessionFinalは再起動時にリセットされるので、voiceFinalTextには後で追加
            };

            recognition.onerror = (event) => {
                if (event.error !== 'aborted') {
                    addLog('error', `音声認識エラー: ${event.error}`);
                }
                stopSpeechRecognition();
            };

            recognition.onend = () => {
                if (isListening) {
                    // 再起動前に現在の確定テキストを保存
                    const previewContent = document.getElementById('voicePreviewContent');
                    const currentText = previewContent.textContent;
                    if (currentText && currentText !== 'Listening...') {
                        // 中間結果を除いた確定部分を保存
                        voiceFinalText = currentText.replace(voiceInterimText, '');
                    }
                    try {
                        recognition.start();
                    } catch (e) {
                        // Ignore if already started
                    }
                }
            };
        }

        function startSpeechRecognition() {
            if (!recognition) {
                addLog('error', '音声認識が初期化されていません');
                return;
            }
            if (!micEnabled) {
                addLog('error', 'マイクを有効にしてください');
                return;
            }

            const voiceBtn = document.getElementById('voiceInputBtn');
            const preview = document.getElementById('voicePreview');
            const previewContent = document.getElementById('voicePreviewContent');
            const textarea = document.getElementById('queryInput');

            // カーソル位置を保存（ボタンクリックでフォーカスが外れる前に）
            savedCursorPos = textarea.selectionStart;

            // 状態リセット
            voiceFinalText = '';
            voiceInterimText = '';
            isListening = true;

            // プレビュー表示
            previewContent.textContent = '聞き取り中...';
            previewContent.classList.add('interim');
            preview.classList.add('active');

            try {
                recognition.start();
            } catch (e) {
                // Already started, ignore
            }

            voiceBtn.textContent = '🎤 聞き取り中...';
            voiceBtn.classList.add('listening');
            addLog('info', '音声入力開始');
        }

        function stopSpeechRecognition() {
            isListening = false;
            if (recognition) {
                try {
                    recognition.stop();
                } catch (e) {
                    // Not started, ignore
                }
            }

            const textarea = document.getElementById('queryInput');
            const voiceBtn = document.getElementById('voiceInputBtn');
            const preview = document.getElementById('voicePreview');
            const previewContent = document.getElementById('voicePreviewContent');

            // ボタン状態を戻す
            voiceBtn.textContent = '🎤 音声入力';
            voiceBtn.classList.remove('listening');

            // プレビューから最終テキストを取得
            const finalText = previewContent.textContent.trim();

            // プレビューを非表示
            preview.classList.remove('active');

            // 有効なテキストがあればカーソル位置に挿入
            if (finalText && finalText !== '聞き取り中...') {
                const text = textarea.value;
                const pos = savedCursorPos;

                // 前後のテキストを取得
                const before = text.substring(0, pos);
                const after = text.substring(pos);

                // 必要に応じてスペースを追加
                const needSpaceBefore = before.length > 0 && !before.endsWith(' ') && !before.endsWith('\n');
                const needSpaceAfter = after.length > 0 && !after.startsWith(' ') && !after.startsWith('\n');

                const insertText = (needSpaceBefore ? ' ' : '') + finalText + (needSpaceAfter ? ' ' : '');

                // 挿入
                textarea.value = before + insertText + after;

                // カーソルを挿入テキストの末尾に移動
                const newCursorPos = pos + insertText.length;
                textarea.focus();
                textarea.selectionStart = textarea.selectionEnd = newCursorPos;

                addLog('info', `音声入力: "${finalText}"`);
            } else {
                addLog('info', '音声入力: 音声なし');
            }

            // 状態リセット
            voiceFinalText = '';
            voiceInterimText = '';
        }

        // WebSocket functions
        function toggleConnection() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.close();
            } else {
                connect();
            }
        }

        function connect() {
            const url = getWsUrl();
            addLog('info', `${url} に接続中...`);

            try {
                ws = new WebSocket(url);

                ws.onopen = () => {
                    updateConnectionStatus(true);
                    addLog('info', 'サーバーに接続しました');
                    // AI専用モードを宣言（WebRTC不要）
                    ws.send(JSON.stringify({ type: 'ai_only' }));
                };

                ws.onclose = () => {
                    updateConnectionStatus(false);
                    addLog('info', '切断されました');
                };

                ws.onerror = (error) => {
                    addLog('error', 'WebSocket エラー');
                };

                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        handleResponse(data);
                    } catch (e) {
                        addLog('error', `解析エラー: ${e.message}`);
                    }
                };
            } catch (e) {
                addLog('error', `接続失敗: ${e.message}`);
            }
        }

        function updateConnectionStatus(connected) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            const sendBtn = document.getElementById('sendBtn');

            if (connected) {
                dot.classList.add('connected');
                text.textContent = '接続中';
                sendBtn.disabled = false;
            } else {
                dot.classList.remove('connected');
                text.textContent = '未接続';
                sendBtn.disabled = true;
            }
        }

        function sendMessage(message) {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                addLog('error', '未接続です');
                return;
            }
            const json = JSON.stringify(message);
            ws.send(json);
            addLog('sent', json);
        }

        function sendQuery() {
            const textarea = document.getElementById('queryInput');
            const query = textarea.value.trim();
            if (!query) return;

            const checkWakeWord = document.getElementById('checkWakeWord').checked;

            // ユーザーメッセージを追加（Markdownなし）
            addChatMessage('user', query, false);

            // ローディング表示
            const loadingMessage = addChatMessage('ai loading', '');
            loadingMessage.id = 'loadingMessage';
            loadingMessage.querySelector('.content').innerHTML = '考え中<span class="thinking-dots"><span>.</span><span>.</span><span>.</span></span>';

            // Always use stream_server proxy (ai_query message type)
            sendMessage({
                type: 'ai_query',
                query: query,
                check_wake_word: checkWakeWord
            });

            // 送信後に自動クリア
            textarea.value = '';
        }

        function stopTTS() {
            sendMessage({ type: 'ai_stop_tts' });
            addLog('info', '音声停止リクエスト');
        }

        function handleResponse(data) {
            // Handle proxied AI response
            if (data.type === 'ai_response') {
                // ローディングメッセージを削除
                const loading = document.getElementById('loadingMessage');
                if (loading) loading.remove();

                if (data.error) {
                    const msg = addChatMessage('ai error', `エラー: ${data.error}`, false);
                    addLog('error', `AI エラー: ${data.error}`);
                } else if (data.skipped) {
                    const reason = data.reason || 'ウェイクワードなし';
                    addChatMessage('ai skipped', `スキップ: ${reason}`, false);
                    addLog('received', `スキップ: ${reason}`);
                } else if (data.response) {
                    // AI回答はMarkdownレンダリング
                    addChatMessage('ai', data.response, true);
                    addLog('received', `AI Response: ${data.response}`);
                }
                return;
            }

            // Handle TTS stopped response
            if (data.type === 'ai_tts_stopped') {
                if (data.stopped) {
                    addLog('info', '音声停止しました');
                } else {
                    addLog('info', '音声は再生中ではありませんでした');
                }
                return;
            }

            // Handle other messages
            addLog('received', JSON.stringify(data));
        }

        function addLog(type, message) {
            const container = document.getElementById('logContainer');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;

            const time = new Date().toLocaleTimeString();
            entry.innerHTML = `<span class="log-time">${time}</span> ${escapeHtml(message)}`;

            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
        }

        function clearLog() {
            document.getElementById('logContainer').innerHTML = '';
        }

        function toggleLogPanel() {
            const container = document.getElementById('logContainer');
            const icon = document.getElementById('logToggleIcon');
            container.classList.toggle('collapsed');
            icon.textContent = container.classList.contains('collapsed') ? '▶' : '▼';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Initialize
        (function() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                document.getElementById('voiceInputBtn').disabled = true;
                document.getElementById('voiceInputBtn').textContent = '非対応';
                document.getElementById('micStatus').textContent = '音声認識非対応';
                document.getElementById('micStatus').style.color = '#ff4757';
                return;
            }

            // Voice Inputボタンのイベント設定
            const voiceBtn = document.getElementById('voiceInputBtn');

            // マウスイベント（ドキュメントレベルでmouseupを監視）
            const handleMouseUp = () => {
                document.removeEventListener('mouseup', handleMouseUp);
                if (isListening) stopSpeechRecognition();
            };

            voiceBtn.addEventListener('mousedown', async (e) => {
                e.preventDefault();
                if (!micEnabled) {
                    // マイク未有効 → 有効化して即開始
                    await enableMicrophone();
                }
                if (micEnabled) {
                    startSpeechRecognition();
                    document.addEventListener('mouseup', handleMouseUp);
                }
            });

            // タッチイベント（モバイル対応）
            voiceBtn.addEventListener('touchstart', async (e) => {
                e.preventDefault();
                if (!micEnabled) {
                    await enableMicrophone();
                }
                if (micEnabled) {
                    startSpeechRecognition();
                }
            });
            voiceBtn.addEventListener('touchend', (e) => {
                e.preventDefault();
                if (isListening) stopSpeechRecognition();
            });
            voiceBtn.addEventListener('touchcancel', () => {
                if (isListening) stopSpeechRecognition();
            });

            // Textarea: Ctrl+Enter で送信
            const textarea = document.getElementById('queryInput');
            textarea.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && e.ctrlKey) {
                    e.preventDefault();
                    sendQuery();
                }
            });

            // 起動時に自動接続
            connect();
        })();
    </script>
</body>
</html>
