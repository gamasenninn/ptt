<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant E2E Test</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: #1a1a2e;
            color: #eee;
        }
        h1 {
            text-align: center;
            color: #00d9ff;
        }
        .panel {
            background: #16213e;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .panel h2 {
            margin-top: 0;
            color: #00d9ff;
            font-size: 1.1em;
        }
        .connection-status {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff4757;
        }
        .status-dot.connected {
            background: #2ed573;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #333;
            border-radius: 4px;
            background: #0f0f23;
            color: #fff;
            font-size: 16px;
            margin-bottom: 10px;
        }
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-primary {
            background: #00d9ff;
            color: #000;
        }
        .btn-primary:hover:not(:disabled) {
            background: #00b8d9;
        }
        .btn-secondary {
            background: #333;
            color: #fff;
        }
        .btn-secondary:hover:not(:disabled) {
            background: #444;
        }
        .btn-voice {
            background: #4a4a6a;
            color: #fff;
            flex: 1;
            padding: 12px 16px;
            font-size: 14px;
        }
        .btn-voice:hover:not(:disabled) {
            background: #5a5a7a;
        }
        .btn-voice.listening {
            background: #2ed573;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        .button-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .panel-header h2 {
            color: #00d9ff;
            font-size: 1.1em;
        }
        .log-container {
            background: #0f0f23;
            border-radius: 4px;
            padding: 15px;
            height: 200px;
            overflow-y: auto;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 13px;
            transition: height 0.3s ease, padding 0.3s ease, opacity 0.3s ease;
        }
        .log-container.collapsed {
            height: 0;
            padding: 0 15px;
            opacity: 0;
            overflow: hidden;
        }
        .log-entry {
            margin-bottom: 8px;
            padding: 8px;
            border-radius: 4px;
        }
        .log-entry.sent {
            background: #1e3a5f;
            border-left: 3px solid #00d9ff;
        }
        .log-entry.received {
            background: #1e4035;
            border-left: 3px solid #2ed573;
        }
        .log-entry.error {
            background: #4a1e1e;
            border-left: 3px solid #ff4757;
        }
        .log-entry.info {
            background: #3d3d1e;
            border-left: 3px solid #ffa502;
        }
        .log-time {
            color: #888;
            font-size: 11px;
        }
        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
        }
        .checkbox-row input {
            width: 18px;
            height: 18px;
        }
        .textarea-container {
            position: relative;
            margin-bottom: 10px;
        }
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #333;
            border-radius: 4px;
            background: #0f0f23;
            color: #fff;
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
            min-height: 80px;
        }
        textarea::placeholder {
            color: #666;
        }
        .voice-preview {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(26, 58, 46, 0.97);
            border: 2px solid #2ed573;
            border-radius: 4px;
            padding: 12px;
            font-size: 16px;
            color: #fff;
            overflow-y: auto;
            z-index: 10;
        }
        .voice-preview.active {
            display: block;
            animation: pulse-border 1.5s infinite;
        }
        .voice-preview .label {
            font-size: 12px;
            color: #2ed573;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .voice-preview .content {
            color: #fff;
            min-height: 24px;
        }
        .voice-preview .content.interim {
            color: #aaa;
            font-style: italic;
        }
        @keyframes pulse-border {
            0%, 100% { border-color: #2ed573; }
            50% { border-color: #1a8a4e; }
        }
        .info-text {
            font-size: 12px;
            color: #888;
            margin-top: 10px;
        }
        .ai-response {
            background: #0f0f23;
            border-radius: 4px;
            padding: 15px;
            min-height: 80px;
            font-size: 16px;
            line-height: 1.6;
            white-space: pre-wrap;
            color: #eee;
        }
        .ai-response.loading {
            color: #888;
            font-style: italic;
        }
        .ai-response.error {
            color: #ff4757;
        }
        .btn-stop {
            background: #ff6b6b;
            color: #fff;
            margin-top: 10px;
            width: 100%;
        }
        .btn-stop:hover:not(:disabled) {
            background: #ee5a5a;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .header h1 {
            margin: 0;
            color: #00d9ff;
        }
        .header .connection-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 4px;
            background: #16213e;
            transition: background 0.2s;
        }
        .header .connection-toggle:hover {
            background: #1a2a4e;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>AI Assistant</h1>
        <div class="connection-toggle" onclick="toggleConnection()">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">Disconnected</span>
        </div>
    </div>

    <!-- Query Input Panel (unified voice + text input) -->
    <div class="panel">
        <h2>Query Input</h2>
        <div class="textarea-container">
            <textarea id="queryInput" rows="3"
                      placeholder="Type here or use voice input... (Ctrl+Enter to send)"></textarea>
            <!-- Voice Preview (PTT中のみ表示、textareaに重ねて表示) -->
            <div id="voicePreview" class="voice-preview">
                <div class="label">🎤 Voice Input</div>
                <div id="voicePreviewContent" class="content">Listening...</div>
            </div>
        </div>

        <!-- Button row: Voice Input + Send Query -->
        <div class="button-row" style="gap: 10px;">
            <button class="btn-voice" id="voiceInputBtn" style="flex: 1;">
                🎤 Voice Input
            </button>
            <button class="btn-primary" id="sendBtn" onclick="sendQuery()" style="flex: 1;">
                Send Query
            </button>
        </div>

        <!-- Options row -->
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 5px;">
            <span id="micStatus" style="color: #888; font-size: 12px;"></span>
            <label style="font-size: 12px; color: #888;">
                <input type="checkbox" id="checkWakeWord" style="width: 14px; height: 14px; margin-right: 4px;">
                Wake word
            </label>
        </div>
    </div>

    <!-- AI Response Panel -->
    <div class="panel">
        <h2>AI Response</h2>
        <div id="aiResponse" class="ai-response">Waiting for query...</div>
        <button class="btn-stop" id="stopTtsBtn" onclick="stopTTS()">Stop Audio</button>
    </div>

    <!-- Log Panel (collapsible, default hidden) -->
    <div class="panel" id="logPanel">
        <div class="panel-header" onclick="toggleLogPanel()">
            <h2 style="margin: 0; cursor: pointer;">
                <span id="logToggleIcon">▶</span> Communication Log
            </h2>
            <button class="btn-secondary" onclick="event.stopPropagation(); clearLog();" style="padding: 6px 12px; font-size: 12px;">Clear</button>
        </div>
        <div class="log-container collapsed" id="logContainer"></div>
    </div>

    <script>
        let ws = null;
        let recognition = null;
        let isListening = false;
        let micStream = null;
        let micEnabled = false;
        // 音声認識の状態（シンプル化）
        let voiceFinalText = '';     // 確定テキスト（セッション全体で蓄積）
        let voiceInterimText = '';   // 中間結果（未確定）
        let savedCursorPos = 0;      // PTT開始時のカーソル位置

        // Get WebSocket URL (same origin as page)
        function getWsUrl() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const host = window.location.hostname || 'localhost';
            const port = window.location.port;
            // ポートが指定されている場合のみ追加（リバースプロキシ経由の場合は不要）
            const portPart = port ? `:${port}` : '';
            return `${protocol}//${host}${portPart}/ws`;
        }

        // Request microphone permission once
        async function enableMicrophone() {
            const statusEl = document.getElementById('micStatus');

            try {
                micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                micEnabled = true;

                statusEl.textContent = 'Hold to speak';
                statusEl.style.color = '#2ed573';

                initSpeechRecognition();
                addLog('info', 'Microphone enabled');

            } catch (err) {
                statusEl.textContent = 'Mic permission denied';
                statusEl.style.color = '#ff4757';
                addLog('error', `Microphone permission denied: ${err.message}`);
            }
        }

        // Initialize Speech Recognition
        function initSpeechRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                addLog('info', 'Web Speech API not supported in this browser');
                document.getElementById('voiceInputBtn').disabled = true;
                return;
            }

            recognition = new SpeechRecognition();
            recognition.lang = 'ja-JP';
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onresult = (event) => {
                // 現在のセッションの結果を取得
                let sessionFinal = '';
                let sessionInterim = '';

                for (let i = 0; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        sessionFinal += transcript;
                    } else {
                        sessionInterim += transcript;
                    }
                }

                // プレビューを更新（メインtextareaは触らない）
                const previewContent = document.getElementById('voicePreviewContent');
                const displayText = voiceFinalText + sessionFinal + sessionInterim;

                if (displayText) {
                    previewContent.textContent = displayText;
                    previewContent.classList.toggle('interim', sessionInterim.length > 0);
                } else {
                    previewContent.textContent = 'Listening...';
                    previewContent.classList.add('interim');
                }

                // 最終結果用に保存
                voiceInterimText = sessionInterim;
                // sessionFinalは再起動時にリセットされるので、voiceFinalTextには後で追加
            };

            recognition.onerror = (event) => {
                if (event.error !== 'aborted') {
                    addLog('error', `Speech recognition error: ${event.error}`);
                }
                stopSpeechRecognition();
            };

            recognition.onend = () => {
                if (isListening) {
                    // 再起動前に現在の確定テキストを保存
                    const previewContent = document.getElementById('voicePreviewContent');
                    const currentText = previewContent.textContent;
                    if (currentText && currentText !== 'Listening...') {
                        // 中間結果を除いた確定部分を保存
                        voiceFinalText = currentText.replace(voiceInterimText, '');
                    }
                    try {
                        recognition.start();
                    } catch (e) {
                        // Ignore if already started
                    }
                }
            };
        }

        function startSpeechRecognition() {
            if (!recognition) {
                addLog('error', 'Speech recognition not initialized');
                return;
            }
            if (!micEnabled) {
                addLog('error', 'Please enable microphone first');
                return;
            }

            const voiceBtn = document.getElementById('voiceInputBtn');
            const preview = document.getElementById('voicePreview');
            const previewContent = document.getElementById('voicePreviewContent');
            const textarea = document.getElementById('queryInput');

            // カーソル位置を保存（ボタンクリックでフォーカスが外れる前に）
            savedCursorPos = textarea.selectionStart;

            // 状態リセット
            voiceFinalText = '';
            voiceInterimText = '';
            isListening = true;

            // プレビュー表示
            previewContent.textContent = 'Listening...';
            previewContent.classList.add('interim');
            preview.classList.add('active');

            try {
                recognition.start();
            } catch (e) {
                // Already started, ignore
            }

            voiceBtn.textContent = '🎤 Listening...';
            voiceBtn.classList.add('listening');
            addLog('info', 'Voice input started');
        }

        function stopSpeechRecognition() {
            isListening = false;
            if (recognition) {
                try {
                    recognition.stop();
                } catch (e) {
                    // Not started, ignore
                }
            }

            const textarea = document.getElementById('queryInput');
            const voiceBtn = document.getElementById('voiceInputBtn');
            const preview = document.getElementById('voicePreview');
            const previewContent = document.getElementById('voicePreviewContent');

            // ボタン状態を戻す
            voiceBtn.textContent = '🎤 Voice Input';
            voiceBtn.classList.remove('listening');

            // プレビューから最終テキストを取得
            const finalText = previewContent.textContent.trim();

            // プレビューを非表示
            preview.classList.remove('active');

            // 有効なテキストがあればカーソル位置に挿入
            if (finalText && finalText !== 'Listening...') {
                const text = textarea.value;
                const pos = savedCursorPos;

                // 前後のテキストを取得
                const before = text.substring(0, pos);
                const after = text.substring(pos);

                // 必要に応じてスペースを追加
                const needSpaceBefore = before.length > 0 && !before.endsWith(' ') && !before.endsWith('\n');
                const needSpaceAfter = after.length > 0 && !after.startsWith(' ') && !after.startsWith('\n');

                const insertText = (needSpaceBefore ? ' ' : '') + finalText + (needSpaceAfter ? ' ' : '');

                // 挿入
                textarea.value = before + insertText + after;

                // カーソルを挿入テキストの末尾に移動
                const newCursorPos = pos + insertText.length;
                textarea.focus();
                textarea.selectionStart = textarea.selectionEnd = newCursorPos;

                addLog('info', `Voice input: "${finalText}"`);
            } else {
                addLog('info', 'Voice input: no speech detected');
            }

            // 状態リセット
            voiceFinalText = '';
            voiceInterimText = '';
        }

        // WebSocket functions
        function toggleConnection() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.close();
            } else {
                connect();
            }
        }

        function connect() {
            const url = getWsUrl();
            addLog('info', `Connecting to ${url}...`);

            try {
                ws = new WebSocket(url);

                ws.onopen = () => {
                    updateConnectionStatus(true);
                    addLog('info', 'Connected to stream_server');
                    // AI専用モードを宣言（WebRTC不要）
                    ws.send(JSON.stringify({ type: 'ai_only' }));
                };

                ws.onclose = () => {
                    updateConnectionStatus(false);
                    addLog('info', 'Disconnected');
                };

                ws.onerror = (error) => {
                    addLog('error', 'WebSocket error');
                };

                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        handleResponse(data);
                    } catch (e) {
                        addLog('error', `Parse error: ${e.message}`);
                    }
                };
            } catch (e) {
                addLog('error', `Connection failed: ${e.message}`);
            }
        }

        function updateConnectionStatus(connected) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');

            if (connected) {
                dot.classList.add('connected');
                text.textContent = 'Connected';
            } else {
                dot.classList.remove('connected');
                text.textContent = 'Disconnected';
            }
        }

        function sendMessage(message) {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                addLog('error', 'Not connected');
                return;
            }
            const json = JSON.stringify(message);
            ws.send(json);
            addLog('sent', json);
        }

        function sendQuery() {
            const textarea = document.getElementById('queryInput');
            const query = textarea.value.trim();
            if (!query) return;

            const checkWakeWord = document.getElementById('checkWakeWord').checked;

            // Show loading state
            const responseEl = document.getElementById('aiResponse');
            responseEl.textContent = 'Thinking...';
            responseEl.classList.add('loading');
            responseEl.classList.remove('error');

            // Always use stream_server proxy (ai_query message type)
            sendMessage({
                type: 'ai_query',
                query: query,
                check_wake_word: checkWakeWord
            });

            // 送信後に自動クリア
            textarea.value = '';
        }

        function stopTTS() {
            sendMessage({ type: 'ai_stop_tts' });
            addLog('info', 'Stop TTS requested');
        }

        function handleResponse(data) {
            const responseEl = document.getElementById('aiResponse');

            // Handle proxied AI response
            if (data.type === 'ai_response') {
                responseEl.classList.remove('loading', 'error');

                if (data.error) {
                    responseEl.textContent = `Error: ${data.error}`;
                    responseEl.classList.add('error');
                    addLog('error', `AI Error: ${data.error}`);
                } else if (data.skipped) {
                    responseEl.textContent = `Skipped: ${data.reason || 'No wake word'}`;
                    addLog('received', `Skipped: ${data.reason || 'No wake word'}`);
                } else if (data.response) {
                    responseEl.textContent = data.response;
                    addLog('received', `AI Response: ${data.response}`);
                }
                return;
            }

            // Handle TTS stopped response
            if (data.type === 'ai_tts_stopped') {
                if (data.stopped) {
                    addLog('info', 'TTS stopped');
                } else {
                    addLog('info', 'TTS was not playing');
                }
                return;
            }

            // Handle other messages
            addLog('received', JSON.stringify(data));
        }

        function addLog(type, message) {
            const container = document.getElementById('logContainer');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;

            const time = new Date().toLocaleTimeString();
            entry.innerHTML = `<span class="log-time">${time}</span> ${escapeHtml(message)}`;

            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
        }

        function clearLog() {
            document.getElementById('logContainer').innerHTML = '';
        }

        function toggleLogPanel() {
            const container = document.getElementById('logContainer');
            const icon = document.getElementById('logToggleIcon');
            container.classList.toggle('collapsed');
            icon.textContent = container.classList.contains('collapsed') ? '▶' : '▼';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Initialize
        (function() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                document.getElementById('voiceInputBtn').disabled = true;
                document.getElementById('voiceInputBtn').textContent = 'Not Supported';
                document.getElementById('micStatus').textContent = 'Speech API not supported';
                document.getElementById('micStatus').style.color = '#ff4757';
                return;
            }

            // Voice Inputボタンのイベント設定
            const voiceBtn = document.getElementById('voiceInputBtn');

            // マウスイベント（ドキュメントレベルでmouseupを監視）
            const handleMouseUp = () => {
                document.removeEventListener('mouseup', handleMouseUp);
                if (isListening) stopSpeechRecognition();
            };

            voiceBtn.addEventListener('mousedown', async (e) => {
                e.preventDefault();
                if (!micEnabled) {
                    // マイク未有効 → 有効化して即開始
                    await enableMicrophone();
                }
                if (micEnabled) {
                    startSpeechRecognition();
                    document.addEventListener('mouseup', handleMouseUp);
                }
            });

            // タッチイベント（モバイル対応）
            voiceBtn.addEventListener('touchstart', async (e) => {
                e.preventDefault();
                if (!micEnabled) {
                    await enableMicrophone();
                }
                if (micEnabled) {
                    startSpeechRecognition();
                }
            });
            voiceBtn.addEventListener('touchend', (e) => {
                e.preventDefault();
                if (isListening) stopSpeechRecognition();
            });
            voiceBtn.addEventListener('touchcancel', () => {
                if (isListening) stopSpeechRecognition();
            });

            // Textarea: Ctrl+Enter で送信
            const textarea = document.getElementById('queryInput');
            textarea.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && e.ctrlKey) {
                    e.preventDefault();
                    sendQuery();
                }
            });
        })();
    </script>
</body>
</html>
